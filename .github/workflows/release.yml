name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Create zip
        run: cd dist && zip -r ../ekagra-${{ github.ref_name }}.zip . -x '*.DS_Store'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ekagra-${{ github.ref_name }}.zip
          generate_release_notes: true
